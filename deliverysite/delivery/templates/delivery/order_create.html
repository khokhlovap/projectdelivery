{% extends 'accounts/lk_base.html' %}
{% block title %}Создание заказа{% endblock %}

{% block lk_content %}
<div class="card shadow-sm">
    <div class="card-header bg-white">
        <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Создание нового заказа</h5>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger small">{{ field.errors }}</div>
                {% endif %}
            </div>
            {% endfor %}
            
            <button type="submit" class="btn btn-success">
                <i class="bi bi-check-circle"></i> Создать заказ
            </button>
            <a href="{% url 'accounts:home' %}" class="btn btn-secondary">
                <i class="bi bi-x-circle"></i> Отмена
            </a>
        </form>
    </div>
</div>
{% endblock %}
