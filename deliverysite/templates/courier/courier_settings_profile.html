{% extends 'courier/courier_base.html' %}
{% load static %}
{% block title %}Профиль - Настройки{% endblock %}

{% block courier_content %}
<style>
    .settings-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 28px;
        padding-bottom: 12px;
        border-bottom: 1px solid #E8E0D5;
    }
    
    .back-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        background: #F5F3F0;
        border-radius: 50%;
        color: #1E7A57;
        text-decoration: none;
        transition: all 0.2s;
        cursor: pointer;
    }
    
    .back-icon:hover {
        background: #1E7A57;
    }
    
    .back-icon:hover i {
        color: white;
    }
    
    .back-icon:active {
        background: #1E7A57;
        transform: scale(0.95);
    }
    
    .back-icon:active i {
        color: white !important;
    }
    
    .back-icon i {
        font-size: 1.4rem;
        transition: color 0.2s;
        color: #1E7A57;
    }
    
    .settings-title {
        font-size: 1.8rem;
        font-weight: 700;
        color: #1E1E1E;
        margin: 0;
    }
    
    .settings-card {
        background: white;
        border-radius: 24px;
        padding: 28px;
        border: 1px solid #E8E0D5;
        box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }
    
    .form-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 24px;
        margin-bottom: 28px;
    }
    
    .form-field {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    
    .form-field-full {
        grid-column: span 2;
    }
    
    .form-label {
        font-size: 0.85rem;
        font-weight: 700;
        color: #6B6B6B;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    
    .form-control {
        padding: 14px 18px;
        border: 1px solid #E8E0D5;
        border-radius: 14px;
        font-size: 1rem;
        transition: all 0.2s;
    }
    
    .form-control:focus {
        outline: none;
        border-color: #1E7A57;
        box-shadow: 0 0 0 3px rgba(30, 122, 87, 0.1);
    }
    
    .form-control:disabled {
        background: #F8F9FA;
        color: #ADB5BD;
    }
    
    .btn-save {
        background: #1E7A57;
        color: white;
        border: none;
        border-radius: 60px;
        padding: 14px 32px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        justify-content: center;
    }
    
    .btn-save:hover {
        background: #155f44;
        transform: translateY(-2px);
    }
    
    .btn-save:active {
        transform: scale(0.98);
    }
    
    .form-hint {
        font-size: 0.8rem;
        color: #ADB5BD;
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 6px;
    }
    
    /* Мобильная адаптация */
    @media (max-width: 768px) {
        .form-grid {
            grid-template-columns: 1fr;
            gap: 20px;
        }
        .form-field-full {
            grid-column: span 1;
        }
    }
    
    @media (max-width: 500px) {
        .settings-header {
            margin-bottom: 24px;
        }
        .back-icon {
            width: 40px;
            height: 40px;
        }
        .back-icon i {
            font-size: 1.3rem;
        }
        .settings-title {
            font-size: 1.6rem;
        }
        .settings-card {
            padding: 20px;
        }
        .form-grid {
            gap: 16px;
            margin-bottom: 24px;
        }
        .form-control {
            padding: 12px 16px;
            font-size: 0.95rem;
        }
        .form-label {
            font-size: 0.8rem;
        }
        .btn-save {
            padding: 12px 24px;
            font-size: 0.9rem;
            width: 100%;
        }
        .btn-save i {
            font-size: 1.1rem;
        }
    }
    
    @media (max-width: 380px) {
        .settings-card {
            padding: 16px;
        }
        .form-control {
            padding: 10px 14px;
            font-size: 0.9rem;
        }
        .btn-save {
            padding: 10px 20px;
            font-size: 0.85rem;
        }
    }
</style>

<div class="settings-header">
    <a href="{% url 'delivery:courier_profile' %}" class="back-icon">
        <i class="bi bi-arrow-left"></i>
    </a>
    <h1 class="settings-title">Профиль</h1>
</div>

<div class="settings-card">
    <form method="post">
        {% csrf_token %}
        
        <div class="form-grid">
            <div class="form-field">
                <label class="form-label">Фамилия</label>
                <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}" required>
            </div>
            <div class="form-field">
                <label class="form-label">Имя</label>
                <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}" required>
            </div>
            <div class="form-field">
                <label class="form-label">Отчество</label>
                <input type="text" name="patronymic" class="form-control" value="{{ user.patronymic|default:'' }}">
            </div>
            <div class="form-field">
                <label class="form-label">Телефон</label>
                <input type="tel" name="phone" class="form-control" value="{{ user.phone|default:'' }}">
            </div>
            <div class="form-field form-field-full">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" value="{{ user.email }}" disabled>
                <div class="form-hint">
                    <i class="bi bi-info-circle"></i> Email нельзя изменить
                </div>
            </div>
        </div>
        
        <button type="submit" class="btn-save">
            <i class="bi bi-save"></i> Сохранить изменения
        </button>
    </form>
    
</div>

<script>
    document.querySelectorAll('.back-icon').forEach(function(button) {
        button.addEventListener('mousedown', function() {
            this.style.transform = 'scale(0.95)';
        });
        
        button.addEventListener('mouseup', function() {
            this.style.transform = 'scale(1)';
        });
        
        button.addEventListener('mouseleave', function() {
            this.style.transform = 'scale(1)';
        });
    });
</script>
{% endblock %}
