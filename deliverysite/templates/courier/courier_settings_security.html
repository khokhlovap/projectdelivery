{% extends 'courier/courier_base.html' %}
{% load static %}
{% block title %}Безопасность - Настройки{% endblock %}

{% block courier_content %}
<style>
    .settings-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 28px;
        padding-bottom: 12px;
        border-bottom: 1px solid #E8E0D5;
    }
    
    .back-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        background: #F5F3F0;
        border-radius: 50%;
        color: #1E7A57;
        text-decoration: none;
        transition: all 0.2s;
        cursor: pointer;
    }
    
    .back-icon:hover {
        background: #1E7A57;
    }
    
    .back-icon:hover i {
        color: white;
    }
    
    .back-icon:active {
        background: #1E7A57;
        transform: scale(0.95);
    }
    
    .back-icon:active i {
        color: white !important;
    }
    
    .back-icon i {
        font-size: 1.4rem;
        transition: color 0.2s;
        color: #1E7A57;
    }
    
    .settings-title {
        font-size: 1.8rem;
        font-weight: 700;
        color: #1E1E1E;
        margin: 0;
    }
    
    .settings-card {
        background: white;
        border-radius: 24px;
        padding: 28px;
        border: 1px solid #E8E0D5;
        box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }
    
    .form-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 24px;
        margin-bottom: 28px;
    }
    
    .form-field {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    
    .form-label {
        font-size: 0.85rem;
        font-weight: 700;
        color: #6B6B6B;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    
    .form-control {
        padding: 14px 18px;
        border: 1px solid #E8E0D5;
        border-radius: 14px;
        font-size: 1rem;
        transition: all 0.2s;
    }
    
    .form-control:focus {
        outline: none;
        border-color: #1E7A57;
        box-shadow: 0 0 0 3px rgba(30, 122, 87, 0.1);
    }
    
    .password-wrapper {
        position: relative;
    }
    
    .password-wrapper .form-control {
        padding-right: 50px;
    }
    
    .toggle-password {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: #ADB5BD;
        padding: 0;
    }
    
    .toggle-password:hover {
        color: #1E7A57;
    }
    
    .toggle-password i {
        font-size: 1.2rem;
    }
    
    .form-hint {
        font-size: 0.8rem;
        color: #ADB5BD;
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 6px;
    }
    
    .btn-save {
        background: #1E7A57;
        color: white;
        border: none;
        border-radius: 60px;
        padding: 14px 32px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        justify-content: center;
    }
    
    .btn-save:hover {
        background: #155f44;
        transform: translateY(-2px);
    }
    
    .btn-save:active {
        transform: scale(0.98);
    }
    
    /* Мобильная адаптация */
    @media (max-width: 500px) {
        .settings-header {
            margin-bottom: 24px;
        }
        
        .back-icon {
            width: 40px;
            height: 40px;
        }
        
        .back-icon i {
            font-size: 1.3rem;
        }
        
        .settings-title {
            font-size: 1.6rem;
        }
        
        .settings-card {
            padding: 20px;
        }
        
        .form-grid {
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .form-control {
            padding: 12px 16px;
            font-size: 0.95rem;
        }
        
        .form-label {
            font-size: 0.8rem;
        }
        
        .toggle-password {
            right: 12px;
        }
        
        .toggle-password i {
            font-size: 1.1rem;
        }
        
        .btn-save {
            padding: 12px 24px;
            font-size: 0.9rem;
            width: 100%;
        }
    }
    
    @media (max-width: 380px) {
        .settings-card {
            padding: 16px;
        }
        
        .form-control {
            padding: 10px 14px;
            font-size: 0.9rem;
        }
        
        .btn-save {
            padding: 10px 20px;
            font-size: 0.85rem;
        }
    }
</style>

<div class="settings-header">
    <a href="{% url 'delivery:courier_profile' %}" class="back-icon">
        <i class="bi bi-arrow-left"></i>
    </a>
    <h1 class="settings-title">Безопасность</h1>
</div>

<div class="settings-card">
    <form method="post">
        {% csrf_token %}
        
        <div class="form-grid">
            <div class="form-field">
                <label class="form-label">Текущий пароль</label>
                <div class="password-wrapper">
                    <input type="password" name="current_password" class="form-control" id="current_password" placeholder="Введите текущий пароль" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('current_password')">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            
            <div class="form-field">
                <label class="form-label">Новый пароль</label>
                <div class="password-wrapper">
                    <input type="password" name="new_password" class="form-control" id="new_password" placeholder="Введите новый пароль" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('new_password')">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div class="form-hint">
                    <i class="bi bi-info-circle"></i> Пароль должен содержать минимум 8 символов
                </div>
            </div>
            
            <div class="form-field">
                <label class="form-label">Подтверждение пароля</label>
                <div class="password-wrapper">
                    <input type="password" name="confirm_password" class="form-control" id="confirm_password" placeholder="Подтвердите новый пароль" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('confirm_password')">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <button type="submit" class="btn-save">
            <i class="bi bi-key"></i> Изменить пароль
        </button>
    </form>
</div>

<script>
    function togglePassword(fieldId) {
        const field = document.getElementById(fieldId);
        const button = field.nextElementSibling;
        const icon = button.querySelector('i');
        
        if (field.type === 'password') {
            field.type = 'text';
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
        } else {
            field.type = 'password';
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
        }
    }
    
    document.querySelectorAll('.back-icon').forEach(function(button) {
        button.addEventListener('mousedown', function() {
            this.style.transform = 'scale(0.95)';
        });
        
        button.addEventListener('mouseup', function() {
            this.style.transform = 'scale(1)';
        });
        
        button.addEventListener('mouseleave', function() {
            this.style.transform = 'scale(1)';
        });
    });
</script>
{% endblock %}
