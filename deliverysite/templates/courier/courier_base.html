{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    /* Мобильная верстка */
    .courier-container {
        max-width: 500px;
        margin: 0 auto;
        padding: 16px;
        padding-bottom: 80px;
    }
    
    /* Карточка профиля */
    .profile-card {
        background: white;
        border-radius: 20px;
        padding: 16px;
        margin-bottom: 16px;
        border: 1px solid #E8E0D5;
        box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }
    
    .profile-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
    }
    .profile-avatar {
        width: 50px;
        height: 50px;
        background: linear-gradient(135deg, #C8E0D6 0%, #E8E0D5 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .profile-avatar i {
        font-size: 1.5rem;
        color: #1E7A57;
    }
    .profile-info h3 {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 2px;
    }
    .profile-info p {
        font-size: 0.7rem;
        color: #6B6B6B;
        margin-bottom: 0;
    }
    
    /* Статус смены */
    .shift-status-card {
        background: white;
        border-radius: 20px;
        padding: 16px;
        margin-bottom: 16px;
        border: 1px solid #E8E0D5;
    }
    .shift-title {
        font-size: 0.8rem;
        font-weight: 600;
        color: #1E1E1E;
        margin-bottom: 12px;
    }
    .shift-buttons {
        display: flex;
        gap: 12px;
    }
    .shift-btn {
        flex: 1;
        padding: 10px;
        border-radius: 40px;
        font-size: 0.8rem;
        font-weight: 500;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        border: none;
    }
    .shift-on {
        background: #1E7A57;
        color: white;
    }
    .shift-off {
        background: #F5F3F0;
        color: #6B6B6B;
    }
    .shift-break {
        background: #FFB74D;
        color: white;
    }
    .shift-active {
        border: 2px solid #1E7A57;
        transform: scale(0.98);
    }
    .shift-timer {
        margin-top: 12px;
        text-align: center;
        font-size: 0.75rem;
        color: #6B6B6B;
    }
    
    /* Карточка заказа */
    .order-card {
        background: white;
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 12px;
        border: 1px solid #E8E0D5;
        transition: all 0.2s;
    }
    .order-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid #E8E0D5;
    }
    .order-id {
        font-weight: 600;
        color: #1E7A57;
        font-size: 0.85rem;
    }
    .order-time {
        font-size: 0.7rem;
        color: #6B6B6B;
    }
    .order-address {
        font-size: 0.8rem;
        margin-bottom: 8px;
    }
    .order-address i {
        color: #1E7A57;
        margin-right: 6px;
    }
    .order-type {
        font-size: 0.7rem;
        color: #6B6B6B;
        margin-bottom: 12px;
    }
    .order-buttons {
        display: flex;
        gap: 10px;
    }
    .btn-accept {
        flex: 1;
        background: #1E7A57;
        color: white;
        border: none;
        border-radius: 30px;
        padding: 8px;
        font-size: 0.75rem;
        cursor: pointer;
    }
    .btn-reject {
        flex: 1;
        background: white;
        color: #dc3545;
        border: 1px solid #f5c6cb;
        border-radius: 30px;
        padding: 8px;
        font-size: 0.75rem;
        cursor: pointer;
    }
    .btn-detail {
        background: white;
        border: 1px solid #E8E0D5;
        border-radius: 30px;
        padding: 8px;
        font-size: 0.75rem;
        color: #6B6B6B;
        cursor: pointer;
        width: 100%;
    }
    
    /* Нижняя навигация */
    .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        max-width: 500px;
        margin: 0 auto;
        background: white;
        border-top: 1px solid #E8E0D5;
        display: flex;
        justify-content: space-around;
        padding: 12px 0 20px;
        z-index: 100;
    }
    .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        text-decoration: none;
        color: #6B6B6B;
        font-size: 0.7rem;
        transition: all 0.2s;
        font-weight: 600;
    }
    .nav-item i {
        font-size: 1.4rem;
    }
    .nav-item.active {
        color: #1E7A57;
    }
    .nav-item span {
        font-size: 0.65rem;
        font-weight: 600;
    }
    
    /* Счетчик уведомлений */
    .badge-count {
        background: #dc3545;
        color: white;
        border-radius: 50%;
        padding: 2px 6px;
        font-size: 0.6rem;
        position: absolute;
        margin-top: -8px;
        margin-left: 12px;
    }
    
    /* Активные заказы */
    .active-order-card {
        background: white;
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 12px;
        border: 1px solid #E8E0D5;
        border-left: 4px solid #1E7A57;
    }
    .active-order-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
    }
    .active-order-status {
        font-size: 0.7rem;
        color: #1E7A57;
        font-weight: 500;
    }
    
    /* Пустое состояние */
    .empty-state {
        text-align: center;
        padding: 40px 20px;
        background: white;
        border-radius: 16px;
        border: 1px solid #E8E0D5;
    }
    .empty-state i {
        font-size: 3rem;
        color: #C8E0D5;
    }
    .empty-state p {
        color: #6B6B6B;
        margin-top: 12px;
    }
</style>

<div class="courier-container">
    {% block courier_content %}
    {% endblock %}
</div>

<!-- Нижняя навигация -->
<div class="bottom-nav">
    <a href="{% url 'delivery:courier_dashboard' %}" class="nav-item {% if active_tab == 'dashboard' %}active{% endif %}">
        <i class="bi bi-house"></i>
        <span>Главная</span>
    </a>
    <a href="{% url 'delivery:courier_active_orders' %}" class="nav-item {% if active_tab == 'active_orders' %}active{% endif %}">
        <i class="bi bi-truck"></i>
        <span>Активные</span>
        <span class="badge-count" id="activeOrdersCount" style="display: none;">0</span>
    </a>
    <a href="{% url 'delivery:courier_profile' %}" class="nav-item {% if active_tab == 'profile' %}active{% endif %}">
        <i class="bi bi-person"></i>
        <span>Профиль</span>
    </a>
</div>

<script>
    // Загрузка количества активных заказов
    function loadActiveOrdersCount() {
        fetch('/delivery/courier/active-count/')
            .then(response => response.json())
            .then(data => {
                const badge = document.getElementById('activeOrdersCount');
                if (data.count > 0) {
                    badge.textContent = data.count;
                    badge.style.display = 'inline-block';
                } else {
                    badge.style.display = 'none';
                }
            });
    }
    loadActiveOrdersCount();
    setInterval(loadActiveOrdersCount, 30000);
</script>
{% endblock %}
