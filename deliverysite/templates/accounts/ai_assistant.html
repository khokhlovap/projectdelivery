{% extends 'accounts/lk_base.html' %}
{% block title %}AI помощник{% endblock %}

{% block lk_content %}
<div class="card shadow-sm">
    <div class="card-header bg-white">
        <h5 class="mb-0"><i class="bi bi-robot"></i> AI помощник</h5>
    </div>
    <div class="card-body">
        <p class="text-muted">Задайте вопрос о доставке, тарифах или статусе заказа</p>
        
        <div class="chat-container border rounded p-3 mb-3" style="height: 400px; overflow-y: auto; background-color: #f8f9fa;">
            <div class="text-center text-muted">
                <i class="bi bi-chat-dots"></i> Здесь будет история диалога
            </div>
        </div>
        
        <div class="input-group">
            <input type="text" class="form-control" placeholder="Введите ваш вопрос..." id="questionInput">
            <button class="btn btn-primary" type="button" id="sendBtn">
                <i class="bi bi-send"></i> Отправить
            </button>
        </div>
    </div>
</div>
{% endblock %}
